<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<title>Open Identity Capsule</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/feather-icons"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>

</head>

<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

<div id="unlockContainer" class="bg-white p-8 rounded-lg shadow-lg w-full max-w-md text-center">

<div class="mb-6 flex justify-center">
    <div class="bg-indigo-100 p-4 rounded-full">
        <i data-feather="package" class="w-12 h-12 text-indigo-600"></i>
    </div>
</div>

<h2 class="text-2xl font-bold text-gray-800 mb-2">Identity Capsule</h2>
<p class="text-gray-500 mb-6">This capsule is password protected. Enter the password below to securely access the bundled documents.</p>

<input type="password" id="inputPassword" placeholder="Enter capsule password" class="border p-3 w-full rounded mb-4 focus:ring-2 focus:ring-indigo-500 outline-none"/>

<button onclick="unlock()" class="bg-indigo-600 text-white px-6 py-3 rounded w-full font-medium hover:bg-indigo-700 transition">
Unlock Capsule
</button>

<p id="error" class="text-red-500 mt-4 h-6"></p>

</div>

<div id="capsuleContent" class="hidden w-full max-w-4xl bg-white shadow-xl rounded-lg overflow-hidden">
    <!-- Header -->
    <div class="bg-indigo-600 p-6 text-white flex items-center justify-between">
        <div class="flex items-center gap-4">
            <i data-feather="package" class="w-10 h-10"></i>
            <div>
                <h2 class="text-2xl font-bold">Identity Capsule</h2>
                <p class="text-indigo-200 text-sm">Secure Document Bundle</p>
            </div>
        </div>
        <div class="bg-white/20 px-4 py-2 rounded-lg text-sm font-medium">
            <span id="docCount">0</span> Documents
        </div>
    </div>
    
    <!-- Content List -->
    <div class="p-8">
        <h3 class="text-lg font-semibold text-gray-700 mb-4 border-b pb-2">Documents Included</h3>
        <div id="capsuleFilesList" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
            <!-- Render files here -->
        </div>
    </div>
</div>

<script>
feather.replace()

const params=new URLSearchParams(window.location.search)

const capsuleParam=params.get("capsule")

const { createClient } = supabase
const supabaseClient = createClient(
"https://rdkssobkslnjwfjxbnue.supabase.co",
"sb_publishable_TPUQ4k-bRe9A4Ih4RlB2ow_4JbSZ9A6"
)

function getFileName(path) {
    const parts = path.split('/')
    return parts[parts.length - 1]
}

async function unlock(){

const input=document.getElementById("inputPassword").value

if(!input){
    document.getElementById("error").innerText="Please enter a password"
    return
}

document.getElementById("error").innerText=""
try {
    // CryptoJS output may contain spaces when URL decoded improperly, ensure we replace spaces back to plus signs if any 
    let safeParam = capsuleParam;
    if(safeParam.includes(' ')) {
        safeParam = safeParam.replace(/ /g, '+');
    }
    
    const bytes = CryptoJS.AES.decrypt(safeParam, input)
    const decryptedPayload = bytes.toString(CryptoJS.enc.Utf8)
    
    if(!decryptedPayload) {
        throw new Error("Invalid Password")
    }
    
    const files = JSON.parse(decryptedPayload)
    
    document.getElementById("unlockContainer").classList.add("hidden")
    document.getElementById("capsuleContent").classList.remove("hidden")
    document.body.classList.remove("items-center", "justify-center")
    document.body.classList.add("p-8")
    
    document.getElementById("docCount").innerText = files.length
    
    const container = document.getElementById("capsuleFilesList")
    container.innerHTML = ""
    
    for (const filePath of files) {
        
        // To make sure receiver can view, we try creating a signed URL
        const { data:urlData, error } = await supabaseClient.storage
        .from("documents")
        .createSignedUrl(filePath, 3600) // 1 hour link
        
        let fileUrl = ""
        if (urlData && urlData.signedUrl) {
            fileUrl = urlData.signedUrl
        } else {
            // Fallback to public URL similar to view.html
            fileUrl = "https://rdkssobkslnjwfjxbnue.supabase.co/storage/v1/object/public/documents/"+filePath
        }
        
        const fileName = getFileName(filePath)
        let icon = "file"
        const lower = fileName.toLowerCase()
        if(lower.endsWith(".png") || lower.endsWith(".jpg") || lower.endsWith(".jpeg")) icon = "image"
        else if(lower.endsWith(".pdf")) icon = "file-text"
        
        const fileItem = document.createElement("div")
        fileItem.className = "bg-gray-50 border p-5 rounded-lg hover:shadow-md transition group flex flex-col justify-between whitespace-normal"
        fileItem.innerHTML = `
            <div>
                <div class="bg-indigo-100 w-12 h-12 rounded-full flex items-center justify-center mb-4 group-hover:bg-indigo-200 transition">
                    <i data-feather="${icon}" class="text-indigo-600"></i>
                </div>
                <h4 class="font-medium text-gray-800 break-words mb-2" title="${fileName}">${fileName}</h4>
            </div>
            <a href="${fileUrl}" target="_blank" class="text-indigo-600 text-sm font-medium hover:underline flex items-center gap-1 mt-4">
                Open Document <i data-feather="external-link" class="w-3 h-3"></i>
            </a>
        `
        container.appendChild(fileItem)
    }
    
    feather.replace()
    
} catch(e) {
    document.getElementById("error").innerText="Wrong password or invalid capsule link."
    console.error(e)
}

}

</script>

</body>
</html>
