<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Obscura Dashboard</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/feather-icons"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

</head>

<body class="bg-gray-100">

<div class="flex h-screen">

<!-- SIDEBAR -->

<div class="w-64 bg-white shadow-lg p-6">

<h1 class="text-2xl font-bold text-indigo-600 mb-10">
Obscura
</h1>

<ul class="space-y-4 text-gray-700">

<li onclick="location.href='dash3.html'" class="flex items-center gap-2 p-2 bg-indigo-100 rounded cursor-pointer">
<i data-feather="folder"></i>
My Documents
</li>

<li onclick="location.href='upload.html'" class="flex items-center gap-2 p-2 hover:bg-gray-100 rounded cursor-pointer">
<i data-feather="upload"></i>
Upload
</li>


<li onclick="location.href='share.html'" class="flex items-center gap-2 p-2 hover:bg-gray-100 rounded cursor-pointer">
<i data-feather="share-2"></i>
Share
</li>

<li onclick="location.href='capsule.html'" class="flex items-center gap-2 p-2 hover:bg-gray-100 rounded cursor-pointer">
<i data-feather="package"></i>
Identity Capsule
</li>

<li onclick="location.href='account.html'" class="flex items-center gap-2 p-2 hover:bg-gray-100 rounded cursor-pointer">
<i data-feather="user"></i>
My Account
</li>
<li onclick="location.href='emergency.html'" class="flex items-center gap-2 p-2 bg-red-100 text-red-600 rounded cursor-pointer font-semibold">
          <i data-feather="alert-triangle"></i> Emergency Mode
        </li>
<li onclick="logout()" class="flex items-center gap-2 p-2 text-red-500 hover:bg-red-100 rounded cursor-pointer">
<i data-feather="log-out"></i>
Logout
</li>

</ul>

</div>


<!-- MAIN -->

<div class="flex-1 flex flex-col">

<!-- TOP NAV -->

<div class="bg-white shadow p-4 flex justify-between items-center">

<input type="text" placeholder="Search documents..." class="border rounded-md px-4 py-2 w-1/3" />

<div class="flex items-center gap-4">

<i data-feather="bell"></i>

<img id="dashProfileImage" src="https://i.pravatar.cc/40" class="rounded-full w-10 h-10 object-cover">

</div>

</div>


<!-- CONTENT -->

<div class="p-10 space-y-8">

<h2 class="text-3xl font-semibold">
My Documents
</h2>


<!-- STATS -->

<div class="grid grid-cols-3 gap-6">

<div class="bg-white p-6 rounded-lg shadow text-center">
<p id="dashTotal" class="text-3xl font-bold text-indigo-600">0</p>
<p>Total Files</p>
</div>

<div class="bg-white p-6 rounded-lg shadow text-center">
<p id="dashImages" class="text-3xl font-bold text-indigo-600">0</p>
<p>Images</p>
</div>

<div class="bg-white p-6 rounded-lg shadow text-center">
<p id="dashPDFs" class="text-3xl font-bold text-indigo-600">0</p>
<p>PDFs</p>
</div>

</div>


<!-- CATEGORY GRIDS -->

<div id="categoriesContainer" class="space-y-12"></div>

</div>

</div>

</div>



<script>

feather.replace()


/* GET USER EMAIL */

const userEmail = localStorage.getItem("userEmail")

if(!userEmail){

alert("Please login again")

window.location.href="login.html"

}


/* LOAD PROFILE PHOTO */

function loadProfilePhoto(){

const savedPhoto = localStorage.getItem("profilePhoto_"+userEmail)

if(savedPhoto){
document.getElementById("dashProfileImage").src = savedPhoto
}

}

loadProfilePhoto()



/* SUPABASE */

const { createClient } = supabase

const supabaseClient = createClient(
"https://rdkssobkslnjwfjxbnue.supabase.co",
"sb_publishable_TPUQ4k-bRe9A4Ih4RlB2ow_4JbSZ9A6"
)



/* LOAD DOCUMENTS */

async function loadDocuments(){

const { data, error } = await supabaseClient.storage
.from("documents")
.list(userEmail)

if(error){
console.error(error)
return
}

const container = document.getElementById("categoriesContainer")

container.innerHTML=""

let total=0
let images=0
let pdfs=0

const categories = {
  education: { title: "Education", files: [], keywords: ["certificate", "assignment", "note", "marksheet"] },
  health: { title: "Health", files: [], keywords: ["medical", "report", "prescription"] },
  work: { title: "Work", files: [], keywords: ["resume", "job", "letter", "presentation"] },
  finance: { title: "Finance", files: [], keywords: ["bank", "statement", "bill", "contract"] },
  personal: { title: "Personal", files: [], keywords: ["id", "personal", "photo"] },
  media: { title: "Media", files: [], keywords: ["image", "music", "video", "mp4", "mp3", "jpg", "png", "jpeg"] },
  others: { title: "Others", files: [], keywords: [] }
};

function getFileCategory(filename) {
  const lowerName = filename.toLowerCase();
  for (const key in categories) {
    if (key === 'others') continue;
    if (categories[key].keywords.some(kw => lowerName.includes(kw))) {
      return key;
    }
  }
  return 'others';
}

          
if(!data || data.length===0){

container.innerHTML="<p class='text-center text-gray-500'>No files uploaded</p>"

return

}


for(const file of data){

total++

const filePath = userEmail + "/" + file.name

const { data:urlData } = await supabaseClient.storage
.from("documents")
.createSignedUrl(filePath,60)

const fileUrl = urlData.signedUrl

let content=""

if(file.name.match(/\.(jpg|jpeg|png|gif)$/i)){

images++

content=`<img src="${fileUrl}" class="w-full h-40 object-cover rounded mb-3">`

}

else if(file.name.endsWith(".pdf")){

pdfs++

content=`<div class="flex justify-center mb-4">
<i data-feather="file-text" class="w-12 h-12 text-red-500"></i>
</div>`

}

else{

content=`<div class="flex justify-center mb-4">
<i data-feather="file" class="w-12 h-12 text-gray-500"></i>
</div>`

}


const category = getFileCategory(file.name);

categories[category].files.push(`

<div class="bg-white p-6 rounded-lg shadow hover:shadow-lg transition">

${content}

<h3 class="font-semibold mb-2 truncate" title="${file.name}">${file.name}</h3>

<a href="${fileUrl}" target="_blank" class="text-indigo-600 text-sm">
Open
</a>

</div>

`)

}

for (const key in categories) {
  if (categories[key].files.length > 0) {
    container.innerHTML += `
      <div>
        <h3 class="text-xl font-medium mb-4 text-gray-700 border-b pb-2 flex items-center gap-2">
           ${categories[key].title} 
           <span class="text-sm bg-gray-200 px-2 py-0.5 rounded text-gray-600">${categories[key].files.length}</span>
        </h3>
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
          ${categories[key].files.join('')}
        </div>
      </div>
    `;
  }
}



document.getElementById("dashTotal").innerText=total
document.getElementById("dashImages").innerText=images
document.getElementById("dashPDFs").innerText=pdfs

feather.replace()

}


loadDocuments()



/* LOGOUT */

function logout(){

localStorage.removeItem("userEmail")

window.location.href="login.html"

}

</script>

</body>
</html>
