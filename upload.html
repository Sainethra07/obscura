<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Upload Document</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://unpkg.com/feather-icons"></script>
<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body class="bg-gray-100 flex items-center justify-center min-h-screen">
  <div class="bg-white p-8 rounded-lg shadow w-96">
    <h2 class="text-xl font-bold mb-6 text-center">Upload Document</h2>
    
    <input type="file" id="fileInput" style="display:none">
    
    <div class="space-y-4">
      <button onclick="uploadType('image')" class="flex items-center gap-3 bg-indigo-600 text-white px-4 py-3 rounded w-full">
        <i data-feather="image"></i> Upload Image
      </button>
      <button onclick="uploadType('pdf')" class="flex items-center gap-3 bg-indigo-600 text-white px-4 py-3 rounded w-full">
        <i data-feather="file-text"></i> Upload PDF
      </button>
      <button onclick="uploadType('any')" class="flex items-center gap-3 bg-indigo-600 text-white px-4 py-3 rounded w-full">
        <i data-feather="file"></i> Upload Other File
      </button>
    </div>

    <p id="status" class="text-green-600 mt-4 text-center font-semibold"></p>
    
    <a href="dash3.html">
      <button class="mt-6 bg-gray-400 text-white px-4 py-2 rounded-md w-full hover:bg-gray-500 transition-colors">
        Back to Dashboard
      </button>
    </a>
  </div>

  <!-- AI Risk Scanner Modal -->
  <div id="riskModal" class="fixed inset-0 bg-black bg-opacity-50 hidden flex items-center justify-center z-50">
    <div class="bg-white rounded-lg p-8 max-w-md w-full shadow-2xl">
      <div class="flex items-center gap-3 text-red-600 mb-4 border-b pb-4">
        <i data-feather="shield-alert" class="w-8 h-8"></i>
        <h3 class="text-2xl font-bold">Security Risk Detected</h3>
      </div>
      
      <p class="text-gray-700 mb-2 font-medium">Our AI Scanner has flagged this document for potential privacy risks:</p>
      <ul id="riskList" class="list-disc pl-5 text-red-500 space-y-1 mb-6 text-sm">
        <!-- Hazards injected here -->
      </ul>
      
      <div class="bg-yellow-50 border-l-4 border-yellow-400 p-3 text-sm text-yellow-800 mb-6">
        Uploading this document may expose sensitive information. Are you sure you want to proceed?
      </div>
      
      <div class="flex gap-4">
        <button id="cancelUploadBtn" class="flex-1 bg-gray-200 text-gray-800 px-4 py-2 rounded font-medium hover:bg-gray-300 transition">Cancel</button>
        <button id="proceedUploadBtn" class="flex-1 bg-red-600 text-white px-4 py-2 rounded font-medium hover:bg-red-700 transition flex items-center justify-center gap-2">
          Upload Anyway
        </button>
      </div>
    </div>
  </div>

<script>
feather.replace()

let selectedType="any"

/* GET LOGGED IN USER */
const userEmail = localStorage.getItem("userEmail")

if(!userEmail){
  document.getElementById("status").innerText="Please login first"
}

/* SUPABASE CONFIG */
const { createClient } = supabase
const supabaseClient = createClient(
  "https://rdkssobkslnjwfjxbnue.supabase.co",
  "sb_publishable_TPUQ4k-bRe9A4Ih4RlB2ow_4JbSZ9A6"
)

/* choose upload type */
function uploadType(type){
  selectedType=type
  const input=document.getElementById("fileInput")
  if(type==="image"){
    input.accept="image/*"
  } else if(type==="pdf"){
    input.accept=".pdf"
  } else {
    input.accept=""
  }
  input.click()
}

/* upload when file selected */
document.getElementById("fileInput").addEventListener("change", async function(){
  const file=this.files[0]
  if(!file) return
  
  if(!userEmail){
    document.getElementById("status").innerText="Please login first"
    return
  }

  /* VALIDATION */
  if(selectedType==="image" && !file.type.startsWith("image/")){
    alert("Please upload an image file")
    return
  }
  if(selectedType==="pdf" && file.type!=="application/pdf"){
    alert("Please upload a PDF file")
    return
  }

  /* RISK SCANNER LOGIC */
  document.getElementById("status").innerText="Scanning Document with AI..."
  document.getElementById("status").className="text-indigo-600 mt-4 text-center font-semibold animate-pulse"
  
  // Simulate AI/OCR analysis delay
  setTimeout(() => {
    const risks = analyzeDocumentForRisks(file);
    document.getElementById("status").classList.remove("animate-pulse");

    if(risks.length > 0) {
      document.getElementById("status").innerText="Risk Detected!"
      document.getElementById("status").className="text-red-600 mt-4 text-center font-semibold"
      showRiskModal(risks, file);
    } else {
      proceedToUpload(file);
    }
  }, 2000);

})

function analyzeDocumentForRisks(file) {
  const risks = [];
  const name = file.name.toLowerCase();
  
  // Mock Risk Rules based on filename patterns (Since client-side OCR isn't feasible here)
  if(name.includes("password") || name.includes("credential")) {
    risks.push("Contains cleartext passwords or credentials");
  }
  if(name.includes("ssn") || name.includes("social")) {
    risks.push("Social Security Number (SSN) detected");
  }
  if(name.includes("card") || name.includes("bank")) {
    risks.push("Financial data or Credit Card numbers detected");
  }
  if(name.includes("medical") || name.includes("health")) {
    risks.push("Protected Health Information (PHI) detected");
  }
  
  return risks;
}

function showRiskModal(risks, file) {
  const modal = document.getElementById("riskModal");
  const riskList = document.getElementById("riskList");
  
  riskList.innerHTML = risks.map(r => `<li>${r}</li>`).join("");
  modal.classList.remove("hidden");
  
  document.getElementById("cancelUploadBtn").onclick = function() {
    modal.classList.add("hidden");
    document.getElementById("status").innerText="Upload Cancelled";
    document.getElementById("status").className="text-gray-500 mt-4 text-center font-semibold";
  };
  
  document.getElementById("proceedUploadBtn").onclick = function() {
    modal.classList.add("hidden");
    proceedToUpload(file);
  };
}

async function proceedToUpload(file) {
  document.getElementById("status").innerText="Uploading..."
  document.getElementById("status").className="text-indigo-600 mt-4 text-center font-semibold"

  /* FILE NAME */
  const fileName = Date.now() + "_" + file.name
  
  /* USER FOLDER */
  const path = userEmail + "/" + fileName

  /* UPLOAD TO SUPABASE */
  const { data, error } = await supabaseClient.storage
    .from("documents")
    .upload(path, file)

  if(error){
    console.error(error)
    document.getElementById("status").innerText="Upload Failed: " + error.message
    document.getElementById("status").className="text-red-600 mt-4 text-center font-semibold"
  } else {
    document.getElementById("status").innerText="Upload Successful ✓"
    document.getElementById("status").className="text-green-600 mt-4 text-center font-semibold"
    setTimeout(()=>{
      window.location.href="dash3.html"
    },1200)
  }
}
</script>
</body>
</html>
